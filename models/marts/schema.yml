version: 2

models:
  - name: fct_fund_performance
    description: "The model that gets all nav values and return values for 1,3,5 years for a scheme code"
    columns:
      - name: scheme_code
        tests:
          - not_null      

  - name: fct_nav_daily
    description: "Incremental daily NAV fact table. Full load on first run, appends new dates only on subsequent runs."
    columns:
      - name: scheme_code
        tests:
          - not_null
      - name: nav_date
        tests:
          - not_null
      - name: nav
        tests:
          - not_null